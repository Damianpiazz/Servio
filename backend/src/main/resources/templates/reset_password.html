<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Recuperación de contraseña</title>
</head>
<body>
<h1>Hola, <span th:text="${name}">Usuario</span></h1>
<p>Recibimos una solicitud para restablecer tu contraseña.</p>
<p>Hacé clic en el siguiente enlace para continuar:</p>
<a th:href="${resetUrl}">Restablecer contraseña</a>
<p>Si no solicitaste este cambio, ignorá este email.</p>
<p>El enlace expira en <strong th:text="${expirationMinutes}">30</strong> minutos.</p>
</body>
</html>
