# PROFILE
spring.config.activate.on-profile=dev

# DATABASE
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}

spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true

# CACHE
cache.host=${CACHE_HOST}
cache.port=${CACHE_PORT}

# MAIL
mail.host=${MAIL_HOST}
mail.port=${MAIL_PORT}

# OBJECT STORAGE
object-storage.endpoint=${OBJECT_STORAGE_ENDPOINT}
object-storage.access-key=${OBJECT_STORAGE_ACCESS_KEY}
object-storage.secret-key=${OBJECT_STORAGE_SECRET_KEY}
object-storage.bucket=${OBJECT_STORAGE_BUCKET}

# LOGGING
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# DEVTOOLS
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true