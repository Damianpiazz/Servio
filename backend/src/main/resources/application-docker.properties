spring.config.activate.on-profile=docker

# DATABASE
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USER}
spring.datasource.password=${DATABASE_PASSWORD}
spring.jpa.hibernate.ddl-auto=${HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=true

# CACHE
spring.data.redis.host=${CACHE_HOST}
spring.data.redis.port=${CACHE_PORT}

# MAIL
mail.host=${MAIL_HOST}
mail.port=${MAIL_PORT}
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
mail.default-sender=no-reply@servio.com

# OBJECT STORAGE
object-storage.endpoint=${OBJECT_STORAGE_ENDPOINT}
object-storage.access-key=${OBJECT_STORAGE_ACCESS_KEY}
object-storage.secret-key=${OBJECT_STORAGE_SECRET_KEY}
object-storage.bucket=${OBJECT_STORAGE_BUCKET}

# JWT
application.security.jwt.secret-key=${JWT_SECRET_KEY:971c2d5a2fc37a983899194f4f997e79a255ab9a18afd593f8f5aa45c7f3306b}
application.security.jwt.expiration=86400000
application.security.jwt.refresh-token.expiration=604800000

# Frontend
app.frontend-url=${FRONTEND_URL:http://localhost:3001}

# Image upload
image.upload.max-size-bytes=2097152
image.upload.allowed-types=image/jpeg,image/png,image/webp

# Identity
identity.user.logo.folder=logos
identity.password-reset.expiration-minutes=30

# DEVTOOLS
spring.devtools.restart.enabled=false
spring.devtools.livereload.enabled=false

# JAVERS
javers.auditableAspectEnabled=false
javers.springDataAuditableRepositoryAspectEnabled=false